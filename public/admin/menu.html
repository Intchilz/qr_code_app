<!DOCTYPE html>
<html>
<head>
  <title>Menu Management</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Admin</h2>
    <ul>
      <li onclick="location.href='/admin/admin.html'">Dashboard</li>
      <li class="active">Menu</li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <h2>Menu Management</h2>

    <!-- ADD CATEGORY -->
    <div class="panel">
      <h3>Add Category</h3>
      <input id="categoryName" placeholder="Category name" />
      <button id="addCategoryBtn">Add</button>
    </div>

    <!-- ADD PRODUCT -->
    <div class="panel">
      <h3>Add Product</h3>
      <input id="productName" placeholder="Name" />
      <input id="productPrice" placeholder="Price" type="number" />
      <input id="productDesc" placeholder="Description" />
      <input type="file" id="productImage" />
      <select id="categorySelect"></select>
      <button id="addProductBtn">Add Product</button>
    </div>

    <!-- MENU LIST -->
    <div class="panel">
      <h3>Menu</h3>
      <div id="menuList"></div>
    </div>

  </main>

</div>

<script type="module" src="/admin/js/menu.js"></script>

</body>
</html>
